name: Deploy to Production

on:
    push:
        branches: [main]
    workflow_dispatch: # Allow manual triggers from GitHub UI

concurrency:
    group: production-deploy
    cancel-in-progress: false # Never cancel a running deployment

env:
    PHP_VERSION: "8.4"
    DEPLOY_SERVER: ${{ secrets.DEPLOY_HOST }}
    DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
    DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}

jobs:
    # ── Job 1: Build ───────────────────────────────────────────────────────────
    build:
        name: Build Release
        runs-on: ubuntu-latest

        outputs:
            release_tag: ${{ steps.release.outputs.tag }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Full history for git log in release notes

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ env.PHP_VERSION }}
                  extensions: intl, pdo, pdo_mysql, gd, zip, mbstring, ctype, iconv
                  coverage: none

            # - name: Setup Node.js (for Tailwind)
            #   uses: actions/setup-node@v4
            #   with:
            #       node-version: "20"
            #       cache: "npm"

            - name: Generate release tag
              id: release
              run: echo "tag=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

            - name: Create .env from CI stub
              run: cp .env.ci .env

            - name: Cache Composer packages
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: prod-composer-${{ hashFiles('composer.lock') }}
                  restore-keys: prod-composer-

            - name: Install Composer dependencies (prod only)
              run: |
                  composer install \
                    --no-dev \
                    --optimize-autoloader \
                    --classmap-authoritative \
                    --no-interaction \
                    --prefer-dist \
                    --no-progress

            # - name: Install npm dependencies
            #   run: npm ci --prefer-offline

            - name: Build Tailwind CSS (production)
              run: |
                  php bin/console tailwind:build --minify
                  php bin/console asset-map:compile

            - name: Verify built assets exist
              run: |
                  test -f public/assets/manifest.json || (echo "ERROR: manifest.json missing" && exit 1)
                  echo "Assets built successfully:"
                  ls -la public/assets/ | head -20

            - name: Create release archive
              run: |
                  RELEASE_TAG="${{ steps.release.outputs.tag }}"

                  # Create a clean archive excluding development files
                  tar \
                    --exclude='.git' \
                    --exclude='.github' \
                    --exclude='node_modules' \
                    --exclude='tests' \
                    --exclude='.php-cs-fixer.cache' \
                    --exclude='.twig-cs-fixer.cache' \
                    --exclude='docker-compose.yml' \
                    --exclude='Dockerfile' \
                    --exclude='docker' \
                    --exclude='*.dist' \
                    --exclude='.env*' \
                    --exclude='var/cache' \
                    --exclude='var/log' \
                    -czf "/tmp/release-${RELEASE_TAG}.tar.gz" .

                  echo "Archive created: $(du -sh /tmp/release-${RELEASE_TAG}.tar.gz | cut -f1)"

            - name: Upload release artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-${{ steps.release.outputs.tag }}
                  path: /tmp/release-${{ steps.release.outputs.tag }}.tar.gz
                  retention-days: 7

    # ── Job 2: Deploy ──────────────────────────────────────────────────────────
    deploy:
        name: Deploy to Hostinger
        runs-on: ubuntu-latest
        needs: build
        environment:
            name: production
            url: https://deeppink-goose-466556.hostingersite.com

        steps:
            - name: Checkout (for deploy script)
              uses: actions/checkout@v4

            - name: Download release artifact
              uses: actions/download-artifact@v4
              with:
                  name: release-${{ needs.build.outputs.release_tag }}
                  path: /tmp/

            - name: Set up SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key

                  # Add server to known_hosts to prevent MITM attacks
                  ssh-keyscan -H -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

            - name: Upload release to server
              env:
                  #domain directory
                  domain_dir: domains/deeppink-goose-466556.hostingersite.com
                  RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
              run: |
                  # Upload the tarball directly to home directory
                  scp -i ~/.ssh/deploy_key \
                      -P ${{ secrets.DEPLOY_PORT }} \
                      -o StrictHostKeyChecking=yes \
                      /tmp/release-${RELEASE_TAG}.tar.gz \
                      ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/$domain_dir/app_incoming.tar.gz

            - name: Prepare app directory on server
              run: |
                  ssh -i ~/.ssh/deploy_key \
                      -p ${{ secrets.DEPLOY_PORT }} \
                      -o StrictHostKeyChecking=yes \
                      ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
                      "mkdir -p ~/$domain_dir/app"
            - name: Run deployment script
              run: |
                  ssh -i ~/.ssh/deploy_key \
                      -p ${{ secrets.DEPLOY_PORT }} \
                      -o StrictHostKeyChecking=yes \
                      ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
                      "bash ~/$domain_dir/app/bin/deploy.sh"

