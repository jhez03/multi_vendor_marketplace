name: CI

on:
    push:
        branches: [develop]
    pull_request:
        branches: [main, develop]

env:
    PHP_VERSION: "8.4"

jobs:
    # ── Job 1: Code Quality ────────────────────────────────────────────────────
    quality:
        name: Code Quality
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ env.PHP_VERSION }}
                  extensions: intl, pdo, pdo_mysql, gd, zip, mbstring, ctype, iconv
                  coverage: none

            # ── FIX: Symfony's bootEnv() requires a .env file to exist.
            # The real .env is git-ignored; we copy the committed .env.ci stub
            # so post-install scripts (cache:clear, assets:install) can boot
            # the kernel without error. No secrets live in .env.ci.
            - name: Create .env from CI stub
              run: cp .env.ci .env

            - name: Cache Composer packages
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: composer-${{ hashFiles('composer.lock') }}
                  restore-keys: composer-

            - name: Install dependencies (dev included for tooling)
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: PHP CS Fixer (dry run)
              run: vendor/bin/php-cs-fixer fix --dry-run --diff --no-interaction
              continue-on-error: false

    # ── Job 2: Tests ───────────────────────────────────────────────────────────
    test:
        name: Tests (PHP ${{ matrix.php }})
        runs-on: ubuntu-latest
        needs: quality

        strategy:
            matrix:
                php: ["8.4"]

        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: marketplace_test
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=3

        env:
            APP_ENV: test
            APP_DEBUG: 0
            APP_SECRET: ci_placeholder_secret_not_used_in_prod_32c
            DATABASE_URL: mysql://root:root@127.0.0.1:3306/marketplace_test?serverVersion=8.0&charset=utf8mb4
            DEFAULT_URI: http://localhost
            MAILER_DSN: "null://null"
            MESSENGER_TRANSPORT_DSN: "in-memory://"
            STRIPE_SECRET_KEY: sk_test_ci_placeholder
            STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
            STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
            PAYPAL_CLIENT_ID: ci_placeholder
            PAYPAL_CLIENT_SECRET: ci_placeholder
            PAYPAL_MODE: sandbox
            APP_CURRENCY: PHP

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  extensions: intl, pdo, pdo_mysql, gd, zip, mbstring, ctype, iconv
                  coverage: xdebug

            # ── FIX: Same reason as the quality job — must exist before composer
            # post-install scripts run. The job-level env: block above overrides
            # any values from this file at runtime; the file just needs to exist.
            - name: Create .env from CI stub
              run: cp .env.ci .env

            - name: Cache Composer packages
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: composer-${{ hashFiles('composer.lock') }}
                  restore-keys: composer-

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: Setup database
              run: |
                  php bin/console doctrine:database:create --env=test --if-not-exists
                  php bin/console doctrine:migrations:migrate --env=test --no-interaction

            - name: Run PHPUnit
              run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

            - name: Upload coverage
              uses: codecov/codecov-action@v4
              if: matrix.php == '8.4'
              with:
                  files: coverage.xml
                  fail_ci_if_error: false
